<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upgrade Membership - TERAVIA</title>
    <style>
        /* Mengubah latar belakang agar tidak putih polos */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); 
            min-height: 100vh;
            padding: 40px 20px; 
            color: #334155; 
        }
        .container { max-width: 800px; margin: 0 auto; }
        
        .card-payment { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); 
            margin-bottom: 40px; 
            border: 1px solid #cbd5e1;
        }
        
        .form-group { margin-bottom: 25px; }
        label { display: block; font-weight: 600; margin-bottom: 10px; color: #475569; }
        .form-control { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; transition: 0.3s; }
        .form-control:focus { border-color: #2563eb; outline: none; }
        
        .price-display { background: #f1f5f9; padding: 25px; border-radius: 12px; text-align: center; margin: 25px 0; border: 2px dashed #cbd5e1; }
        .price-display h2 { margin: 0; color: #2563eb; font-size: 36px; }
        
        /* Tombol disesuaikan dengan warna utama brand */
        .btn-submit { 
            width: 100%; 
            background-color: #2563eb; /* SAMAKAN DENGAN TOMBOL BERANDA ANDA */
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .btn-submit:hover { background-color: #1d4ed8; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }

        .comparison-table { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 18px; text-align: center; border-bottom: 1px solid #f1f5f9; }
        th { background: #f8fafc; color: #1e293b; font-weight: 700; }
    </style>
</head>
<body>

<div class="container">
    <div class="card-payment">
        <h2 style="margin-top:0; color: #1e293b;">Pilih Level Membership</h2>
        <p>Tingkatkan performa iklan Anda dengan memilih paket yang paling sesuai.</p>
        
        <div class="form-group">
            <label>Tipe Paket</label>
            <select id="select-paket" class="form-control" onchange="updateHarga()">
                <option value="bronze" data-harga="Rp 100.000">Bronze</option>
                <option value="silver" data-harga="Rp 250.000">Silver</option>
                <option value="gold" data-harga="Rp 500.000">Gold</option>
                <option value="platinum" data-harga="Rp 1.000.000">Platinum</option>
            </select>
        </div>

        <div class="price-display">
            <small>Total Investasi</small>
            <h2 id="display-harga">Rp 100.000</h2>
        </div>

        <div class="form-group">
            <label>Metode Pembayaran</label>
            <select class="form-control">
                <option>Transfer Bank BCA</option>
                <option>E-Wallet (QRIS)</option>
                <option>Virtual Account</option>
            </select>
        </div>

        <button class="btn-submit" onclick="prosesUpgrade()">UPGRADE AKUN</button>
    </div>

    <div class="comparison-table">
        <h3 style="margin-top:0;">Perbandingan Benefit</h3>
        <table>
            <thead>
                <tr>
                    <th>Fitur</th>
                    <th>Bronze</th>
                    <th>Silver</th>
                    <th>Gold</th>
                    <th>Platinum</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>Jumlah Iklan</td><td>5</td><td>15</td><td>50</td><td>Unlimited</td></tr>
                <tr><td>Top Ads</td><td>-</td><td>1x</td><td>5x</td><td>Unlimited</td></tr>
                <tr><td>Verifikasi Akun</td><td>Basic</td><td>Verified</td><td>Priority</td><td>VIP</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    function updateHarga() {
        const select = document.getElementById('select-paket');
        const harga = select.options[select.selectedIndex].getAttribute('data-harga');
        document.getElementById('display-harga').innerText = harga;
    }

    function prosesUpgrade() {
        const paket = document.getElementById('select-paket').value;
        localStorage.setItem('user_status', paket);
        alert('Upgrade berhasil! Anda kini berlangganan paket ' + paket.toUpperCase());
        window.location.href = 'pasang-iklan.html';
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upgrade Membership - TERAVIA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #3dfff9;
            --white: #ffffff;
        }

        * { box-sizing: border-box; transition: all 0.2s ease-in-out; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            /* Overlay gradasi transparan tipis + background gambar terintegrasi */
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.4) 0%, rgba(3, 0, 214, 0.2) 100%),
                        url('../assets/img/hero-bg.png') no-repeat center center fixed; 
            background-size: cover;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        /* Kartu Frosted Glass Transparan (Persis seperti halaman Login) */
        .glass-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 40px 35px;
            border-radius: 28px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            max-width: 480px;
            width: 100%;
            text-align: center;
        }

        .logo-img {
            height: 80px;
            width: auto;
            max-width: 100%;
            object-fit: contain;
            margin-bottom: 25px;
            filter: drop-shadow(0px 4px 8px rgba(0, 0, 0, 0.15));
        }

        .form-title {
            font-size: 26px;
            font-weight: 700;
            color: var(--white);
            margin: 0 0 5px 0;
        }

        .form-subtitle {
            margin: 0 0 35px 0;
            color: rgba(255, 255, 255, 0.65);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 30px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.85);
            font-size: 14px;
        }

        /* List Pilihan Paket Gaya Transparan Kaca */
        .packet-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .packet-option {
            position: relative;
            cursor: pointer;
        }

        .packet-option input {
            position: absolute;
            opacity: 0;
            width: 0; height: 0;
        }

        .packet-card {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 16px 20px;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--white);
        }

        .packet-card:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .packet-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .packet-name { font-weight: 700; font-size: 16px; }
        .packet-price { font-size: 14px; color: rgba(255, 255, 255, 0.6); }

        .badge-discount {
            font-size: 11px;
            background: rgba(239, 68, 68, 0.85);
            color: var(--white);
            padding: 3px 8px;
            border-radius: 6px;
            font-weight: 600;
        }

        /* Highlight saat Paket dipilih */
        .packet-option input:checked + .packet-card {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(61, 255, 249, 0.2);
        }

        /* Select Dropdown Gaya Underline Transparan */
        .form-control { 
            width: 100%; 
            padding: 10px 0; 
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.4);
            font-size: 16px; 
            font-family: inherit;
            background: transparent; 
            color: var(--white);
            outline: none;
            cursor: pointer;
        }

        .form-control:focus {
            border-bottom-color: var(--primary);
        }

        /* Mengatur agar teks di dalam opsi dropdown bawaan OS tetap terbaca */
        .form-control option {
            background: #1e293b;
            color: var(--white);
        }
        
        /* Box Total Investasi Transparan */
        .price-display { 
            background: rgba(255, 255, 255, 0.05);
            padding: 20px; 
            border-radius: 16px; 
            margin: 30px 0; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        .price-display small { font-size: 13px; color: rgba(255, 255, 255, 0.6); display: block; margin-bottom: 2px;}
        .price-display h2 { margin: 0; color: var(--primary); font-size: 32px; font-weight: 800; }
        
        /* Tombol Lonjong Putih Bersih khas Login */
        .btn-submit { 
            width: 100%; 
            background: var(--white); 
            color: #0300D6; 
            border: none; 
            padding: 15px; 
            border-radius: 30px; 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        .btn-submit:hover { 
            background: var(--primary);
            color: #0f172a;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(61, 255, 249, 0.3);
        }
    </style>
</head>
<body>

<div class="glass-card">
    <!-- Mengambil logo transparan dari folder assets/img -->
    <img src="../assets/img/logo.png" alt="TERAVIA Logo" class="logo-img" onerror="this.style.display='none'">
    
    <h1 class="form-title">Membership</h1>
    <p class="form-subtitle">Pilih paket terbaik untuk tingkatkan iklan properti Anda</p>
    
    <form onsubmit="prosesUpgrade(event)">
        <div class="form-group">
            <label>Pilih Tipe Akun</label>
            <div class="packet-list">
                
                <label class="packet-option">
                    <input type="radio" name="paket" value="bronze" data-harga="Free" checked onchange="updateHarga(this)">
                    <div class="packet-card">
                        <div class="packet-info">
                            <span class="packet-name">Bronze</span>
                            <span class="packet-price">Gratis</span>
                        </div>
                    </div>
                </label>

                <label class="packet-option">
                    <input type="radio" name="paket" value="gold" data-harga="Rp 100.000" onchange="updateHarga(this)">
                    <div class="packet-card">
                        <div class="packet-info">
                            <span class="packet-name">Gold</span>
                            <span class="packet-price">Rp 100.000</span>
                        </div>
                        <span class="badge-discount">Hemat 50%</span>
                    </div>
                </label>

                <label class="packet-option">
                    <input type="radio" name="paket" value="silver" data-harga="Rp 250.000" onchange="updateHarga(this)">
                    <div class="packet-card">
                        <div class="packet-info">
                            <span class="packet-name">Silver</span>
                            <span class="packet-price">Rp 250.000</span>
                        </div>
                        <span class="badge-discount">Hemat 37%</span>
                    </div>
                </label>

                <label class="packet-option">
                    <input type="radio" name="paket" value="platinum" data-harga="Rp 500.000" onchange="updateHarga(this)">
                    <div class="packet-card">
                        <div class="packet-info">
                            <span class="packet-name">Platinum</span>
                            <span class="packet-price">Rp 500.000</span>
                        </div>
                        <span class="badge-discount">Hemat 37%</span>
                    </div>
                </label>

            </div>
        </div>

        <div class="form-group">
            <label>Metode Pembayaran</label>
            <select class="form-control">
                <option>Virtual Account (BCA, Mandiri, BNI)</option>
                <option>E-Wallet / QRIS (OVO, Dana, LinkAja)</option>
                <option>Transfer Bank Manual</option>
            </select>
        </div>

        <div class="price-display">
            <small>Total Investasi</small>
            <h2 id="display-harga">Free</h2>
        </div>

        <button type="submit" class="btn-submit">Upgrade Now</button>
    </form>
</div>

<script>
    function updateHarga(element) {
        const harga = element.getAttribute('data-harga');
        document.getElementById('display-harga').innerText = harga;
    }

    function prosesUpgrade(e) {
        e.preventDefault();
        const pilihanPaket = document.querySelector('input[name="paket"]:checked').value;
        localStorage.setItem('user_status', pilihanPaket);
        alert('Upgrade ke paket ' + pilihanPaket.toUpperCase() + ' berhasil diproses!');
        window.location.href = 'pasang-iklan.html';
    }
</script>
</body>
</html>

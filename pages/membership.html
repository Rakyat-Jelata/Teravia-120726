<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upgrade Membership - TERAVIA</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            /* Menggunakan gambar dari assets/img */
            background: url('assets/img/hero-bg.png') no-repeat center center fixed; 
            background-size: cover;
            min-height: 100vh;
            padding: 40px 20px; 
            color: #334155; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { max-width: 800px; width: 100%; margin: 0 auto; }
        
        /* Efek Glassmorphism */
        .glass-card { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2); 
            margin-bottom: 30px;
        }
        
        .form-group { margin-bottom: 25px; }
        label { display: block; font-weight: 600; margin-bottom: 10px; color: #1e293b; }
        .form-control { width: 100%; padding: 14px; border: 1px solid rgba(255,255,255,0.5); border-radius: 12px; font-size: 16px; background: rgba(255,255,255,0.6); }
        
        .price-display { background: rgba(255, 255, 255, 0.5); padding: 20px; border-radius: 12px; text-align: center; margin: 25px 0; border: 1px solid rgba(255,255,255,0.8); }
        .price-display h2 { margin: 0; color: #2563eb; font-size: 32px; }
        
        .btn-submit { 
            width: 100%; 
            background-color: #2563eb; 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .btn-submit:hover { background-color: #1d4ed8; }

        /* Tabel tetap semi-transparan agar serasi */
        .comparison-table { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); padding: 30px; border-radius: 20px; overflow-x: auto; border: 1px solid rgba(255, 255, 255, 0.3); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.05); }
        th { color: #1e293b; }
    </style>
</head>
<body>

<div class="container">
    <!-- Container Pembayaran (Glassmorphism) -->
    <div class="glass-card">
        <h2 style="margin-top:0; color: #1e293b;">Upgrade Membership</h2>
        <p>Pilih paket langganan untuk membuka fitur premium di Teravia.</p>
        
        <div class="form-group">
            <label>Tipe Paket</label>
            <select id="select-paket" class="form-control" onchange="updateHarga()">
                <option value="bronze" data-harga="Rp 100.000">Bronze</option>
                <option value="silver" data-harga="Rp 250.000">Silver</option>
                <option value="gold" data-harga="Rp 500.000">Gold</option>
                <option value="platinum" data-harga="Rp 1.000.000">Platinum</option>
            </select>
        </div>

        <div class="price-display">
            <small>Total Investasi</small>
            <h2 id="display-harga">Rp 100.000</h2>
        </div>

        <div class="form-group">
            <label>Metode Pembayaran</label>
            <select class="form-control">
                <option>Transfer Bank BCA</option>
                <option>E-Wallet (QRIS)</option>
                <option>Virtual Account</option>
            </select>
        </div>

        <button class="btn-submit" onclick="prosesUpgrade()">UPGRADE AKUN</button>
    </div>

    <!-- Tabel Perbandingan (Glassmorphism) -->
    <div class="comparison-table">
        <h3 style="margin-top:0;">Perbandingan Benefit</h3>
        <table>
            <thead>
                <tr>
                    <th>Fitur</th>
                    <th>Bronze</th>
                    <th>Silver</th>
                    <th>Gold</th>
                    <th>Platinum</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>Jumlah Iklan</td><td>5</td><td>15</td><td>50</td><td>Unlimited</td></tr>
                <tr><td>Top Ads</td><td>-</td><td>1x</td><td>5x</td><td>Unlimited</td></tr>
                <tr><td>Verifikasi Akun</td><td>Basic</td><td>Verified</td><td>Priority</td><td>VIP</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    function updateHarga() {
        const select = document.getElementById('select-paket');
        const harga = select.options[select.selectedIndex].getAttribute('data-harga');
        document.getElementById('display-harga').innerText = harga;
    }

    function prosesUpgrade() {
        const paket = document.getElementById('select-paket').value;
        localStorage.setItem('user_status', paket);
        alert('Upgrade berhasil! Anda kini berlangganan paket ' + paket.toUpperCase());
        window.location.href = 'pasang-iklan.html';
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - TERAVIA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
    /* Gaya dasar diimpor sama agar konsisten */
    :root { --primary: #3dfff9; --white: #ffffff; }
    * { box-sizing: border-box; transition: all 0.2s ease-in-out; }
    body { 
        font-family: 'Plus Jakarta Sans', sans-serif; 
        background: linear-gradient(135deg, rgba(15, 23, 42, 0.4) 0%, rgba(3, 0, 214, 0.2) 100%),
                    url('assets/img/hero-bg.png') no-repeat center center fixed; 
        background-size: cover; min-height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; padding: 40px 20px;
    }
    .glass-card {
        background: rgba(255, 255, 255, 0.12); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
        border: 1px solid rgba(255, 255, 255, 0.25); padding: 40px 35px; border-radius: 28px;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2); max-width: 440px; width: 100%; text-align: center;
    }
    .logo-img {
        height: 80px; /* Ukuran diperbesar dari sebelumnya agar lebih proporsional */
        width: auto;
        max-width: 100%; /* Menjaga agar logo tetap aman dan tidak meluber di layar HP */
        object-fit: contain;
        margin-bottom: 30px; /* Memberikan jarak vertikal yang lebih lega ke teks 'Login' */
        filter: drop-shadow(0px 4px 8px rgba(0, 0, 0, 0.15)); /* Efek bayangan halus agar logo makin stand out */
    }

    /* KODE PENYELAMAT YANG HILANG DI BAWAH INI: */
    .form-title { 
        font-size: 26px; 
        font-weight: 700; 
        color: var(--white); 
        margin: 0 0 35px 0; 
    }
    
    .form-group { 
        margin-bottom: 25px; 
        text-align: left; 
    }
    
    .form-group label { 
        display: block; 
        font-weight: 500; 
        margin-bottom: 5px; 
        color: rgba(255, 255, 255, 0.85); 
        font-size: 14px; 
    }
    
    .form-control { 
        width: 100%; 
        padding: 10px 0; 
        border: none; 
        border-bottom: 2px solid rgba(255, 255, 255, 0.4); 
        font-size: 16px; 
        font-family: inherit; 
        background: transparent; 
        color: var(--white); 
        outline: none; 
    }
    
    .form-control:focus { 
        border-bottom-color: var(--primary); 
    }
    
    .form-control::placeholder {
        color: rgba(255, 255, 255, 0.35);
    }
    
    .btn-submit { 
        width: 100%; 
        background: var(--white); 
        color: #0300D6; 
        border: none; 
        padding: 14px; 
        border-radius: 30px; 
        font-size: 16px; 
        font-weight: 700; 
        cursor: pointer; 
        margin-top: 15px; 
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15); 
    }
    
    .btn-submit:hover { 
        background: var(--primary); 
        color: #0f172a; 
        transform: translateY(-1px);
    }
    
    .footer-text { 
        margin-top: 30px; 
        font-size: 13px; 
        color: rgba(255, 255, 255, 0.7); 
    }
    
    .footer-text a { 
        color: var(--white); 
        text-decoration: none; 
        font-weight: 700; 
    }
    
    .footer-text a:hover { 
        color: var(--primary); 
        text-decoration: underline; 
    }
</style>

</head>
<body>

<div class="glass-card">
    <img src="assets/img/logo.png" alt="TERAVIA Logo" class="logo-img" onerror="this.style.display='none'">
    <h1 class="form-title">Admin Sandbox</h1>
    <div class="form-subtitle">Panel Pengujian Internal System</div>

    <form onsubmit="handleAdminLogin(event)">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" class="form-control" required autocomplete="off">
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-control" required>
        </div>
        
        <button type="submit" class="btn-submit">Log In to Dashboard</button>
    </form>

    <div class="tip-box">
        🔑 Akun Admin:<br>
        <span style="color: #fff;">User: <b>admin</b> | Pass: <b>admin123</b></span>
    </div>
</div>

<script>
    function handleAdminLogin(e) {
        e.preventDefault();
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        if (user === 'admin' && pass === 'admin123') {
            sessionStorage.setItem('admin_session', 'authenticated_true');
            window.location.href = 'admin-test.html';
        } else {
            alert('Akses Admin Ditolak!');
        }
    }
</script>

</body>
</html>

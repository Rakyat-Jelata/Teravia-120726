<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login Sandbox - TERAVIA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #3dfff9;
            --primary-hover: #00e5de;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --bg-glass: rgba(255, 255, 255, 0.75);
            --border-glass: rgba(255, 255, 255, 0.4);
        }

        * { box-sizing: border-box; transition: all 0.2s ease-in-out; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .login-card h1 {
            margin: 0 0 8px 0;
            font-size: 24px;
            font-weight: 800;
            color: #ffffff;
        }

        .login-card p {
            margin: 0 0 32px 0;
            color: #94a3b8;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            background: rgba(15, 23, 42, 0.6);
            color: #ffffff;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(61, 255, 249, 0.15);
        }

        .btn-login {
            width: 100%;
            background: var(--primary);
            color: var(--text-main);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 14px rgba(61, 255, 249, 0.2);
        }

        .btn-login:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(61, 255, 249, 0.3);
        }

        .error-msg {
            color: #ef4444;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            font-weight: 500;
        }

        .credential-tip {
            margin-top: 24px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 12px;
            font-size: 12px;
            color: #64748b;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

<div class="login-card">
    <h1>TERAVIA Admin Panel</h1>
    <p>Silakan masuk ke sistem manajemen pengujian</p>
    
    <div id="error-box" class="error-msg">Username atau password salah!</div>

    <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" class="form-control" placeholder="Masukkan username" required autocomplete="off">
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-control" placeholder="Masukkan password" required>
        </div>
        
        <button type="submit" class="btn-login">MASUK DASHBOARD</button>
    </form>

    <div class="credential-tip">
        🔑 Akun Uji Coba:<br>
        <span style="color: #cbd5e1;">Username: <b>admin</b> | Password: <b>admin123</b></span>
    </div>
</div>

<script>
    function handleLogin(e) {
        e.preventDefault();
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const errorBox = document.getElementById('error-box');

        // Validasi akun simulasi
        if (user === 'admin' && pass === 'admin123') {
            errorBox.style.display = 'none';
            // Simpan token otentikasi sementara ke sessionStorage
            sessionStorage.setItem('admin_session', 'authenticated_true');
            alert('Login sukses! Selamat datang kembali Admin.');
            window.location.href = 'admin-test.html';
        } else {
            errorBox.style.display = 'block';
            // Animasi shake kecil saat error
            const card = document.querySelector('.login-card');
            card.style.transform = 'translateX(6px)';
            setTimeout(() => card.style.transform = 'translateX(-6px)', 50);
            setTimeout(() => card.style.transform = 'translateX(0)', 100);
        }
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Member - TERAVIA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Gaya dasar diimpor sama agar konsisten */
        :root { --primary: #3dfff9; --white: #ffffff; }
        * { box-sizing: border-box; transition: all 0.2s ease-in-out; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.4) 0%, rgba(3, 0, 214, 0.2) 100%),
                        url('assets/img/hero-bg.png') no-repeat center center fixed; 
            background-size: cover; min-height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; padding: 40px 20px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.12); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.25); padding: 40px 35px; border-radius: 28px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2); max-width: 440px; width: 100%; text-align: center;
        }
        .logo-img {
    height: 80px; /* Ukuran diperbesar dari sebelumnya agar lebih proporsional */
    width: auto;
    max-width: 100%; /* Menjaga agar logo tetap aman dan tidak meluber di layar HP */
    object-fit: contain;
    margin-bottom: 30px; /* Memberikan jarak vertikal yang lebih lega ke teks 'Login' */
    filter: drop-shadow(0px 4px 8px rgba(0, 0, 0, 0.15)); /* Efek bayangan halus agar logo makin stand out */
}

    </style>
</head>
<body>

<div class="glass-card">
    <!-- Logo Teravia yang sudah diperbesar & aman -->
    <img src="assets/img/logo.png" alt="TERAVIA Logo" class="logo-img" onerror="this.style.display='none'">
    <h1 class="form-title">Register</h1>

    <form onsubmit="handleRegister(event)">
        <!-- Setiap baris dibungkus .form-group agar susunan vertikalnya konsisten -->
        <div class="form-group">
            <label for="fullname">Nama Lengkap</label>
            <input type="text" id="fullname" class="form-control" placeholder="Masukkan nama lengkap" required>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" class="form-control" placeholder="Masukkan email" required>
        </div>
        
        <div class="form-group">
            <label for="password">Password Baru</label>
            <input type="password" id="password" class="form-control" placeholder="Minimal 6 karakter" minlength="6" required>
        </div>
        
        <!-- Tombol wajib menggunakan class="btn-submit" agar lonjong dan bersih -->
        <button type="submit" class="btn-submit">Register</button>
    </form>

    <div class="footer-text">
        Already have an account? <a href="login.html">Login</a>
    </div>
</div>

<script>
    function handleRegister(e) {
        e.preventDefault();
        const email = document.getElementById('email').value;
        localStorage.setItem('is_member_logged_in', 'true');
        localStorage.setItem('member_email', email);
        localStorage.setItem('user_status', 'bronze');
        alert('Registrasi sukses!');
        window.location.href = 'pages/dashboard-member.html';
    }
</script>

</body>


</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk Akun Member - TERAVIA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #3dfff9;
            --primary-hover: #00e5de;
            --bg-panel: #0300D6;
            --text-main: #0f172a;
        }

        * { box-sizing: border-box; transition: all 0.2s ease-in-out; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background: var(--bg-panel);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(3, 0, 214, 0.3);
            max-width: 420px;
            width: 100%;
            text-align: center;
        }

        .logo-placeholder {
            font-size: 24px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .logo-placeholder span { color: var(--primary); }

        .login-card p {
            margin: 0 0 32px 0;
            color: rgba(255, 255, 255, 0.75);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            background: rgba(0, 0, 0, 0.2);
            color: #ffffff;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(61, 255, 249, 0.3);
        }

        .btn-login {
            width: 100%;
            background: var(--primary);
            color: var(--text-main);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 14px rgba(61, 255, 249, 0.3);
        }

        .btn-login:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(61, 255, 249, 0.5);
        }

        .error-msg {
            color: #ff4a4a;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            font-weight: 600;
        }

        .footer-links {
            margin-top: 24px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
        }
        .footer-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-placeholder">TERA<span>VIA</span></div>
    <p>Masuk untuk mengelola dan memasang iklan properti Anda</p>
    
    <div id="error-box" class="error-msg">Email atau password salah!</div>

    <form id="member-login-form" onsubmit="handleMemberLogin(event)">
        <div class="form-group">
            <label for="email">Alamat Email</label>
            <input type="email" id="email" class="form-control" placeholder="nama@email.com" required autocomplete="email">
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn-login">MASUK AKUN</button>
    </form>

    <div class="footer-links">
        Belum punya akun? <a href="#">Daftar Baru</a>
    </div>
</div>

<script>
    function handleMemberLogin(e) {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const errorBox = document.getElementById('error-box');

        // Simulasi akun member trial & error (Bisa pakai email apa saja, password: user123)
        if (pass === 'user123') {
            errorBox.style.display = 'none';
            
            // Simpan status login member biasa
            localStorage.setItem('is_member_logged_in', 'true');
            localStorage.setItem('member_email', email);
            
            alert('Login Berhasil! Mengalihkan ke Dashboard Member...');
            // Redirect masuk ke folder pages/dashboard-member.html
            window.location.href = 'pages/dashboard-member.html';
        } else {
            errorBox.style.display = 'block';
            errorBox.innerText = "Password salah! (Gunakan password uji coba: user123)";
            
            // Efek shake error
            const card = document.querySelector('.login-card');
            card.style.transform = 'translateX(6px)';
            setTimeout(() => card.style.transform = 'translateX(-6px)', 50);
            setTimeout(() => card.style.transform = 'translateX(0)', 100);
        }
    }
</script>

</body>
</html>
